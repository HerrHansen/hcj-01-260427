<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        div {
            border: 1px solid red;
        }

        span {
            border: 1px solid blue;
        }


        .banner {
            background-color: pink;
            font-color: white;
            border-radius: 5px;
            padding: 2px;
            font-size: 5px;
            display: inline-block;
            width: 10px;
            height: 10px;
        }

        /* pond-level-2 */

        /* Auto layout */
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        padding: 50px;

        position: relative;
        width: 1000px;
        height: 1000px;

        background: #5B8BB8;

    </style>

</head>

<body>
    <div>
        <h1>
            Title
        </h1>
        <p>
            Ich bin
            <span style="color: red;">
                wichtig

                <span class="banner">!</span>
            </span>!!!
        </p>
        <span>
            ich bin auch ein span
        </span>
        <span>
            ich bin kurz
        </span>


    </div>

    <div style="display: none;">
        ich bin ein div A
    </div>
    <div>
        ich bin ein div B
    </div>
</body>

</html>
